repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      # Entries delegate to `just` recipes so each command is defined once in
      # the justfile (single source of truth). CI runs the same recipes.
      - id: ruff-format
        name: ruff format
        entry: just format-check
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: just lint
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty check
        entry: just typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: unit-tests
        name: unit tests
        entry: just test-unit
        language: system
        pass_filenames: false
        always_run: true

      - id: web-typecheck
        name: web typecheck
        entry: just web-typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: web-tests
        name: web tests
        entry: just web-test
        language: system
        pass_filenames: false
        always_run: true

      # License check (issue #92), offline half: guards that every image a
      # Dockerfile or Compose file references is in the reviewed manifest. Fast
      # and network-free, so it runs on every commit.
      - id: licenses-manifest
        name: bundled image licenses
        entry: just licenses-manifest
        language: system
        pass_filenames: false
        always_run: true

      # License check, dependency half: osv-scanner resolves licenses via deps.dev
      # (network), so it is scoped to lockfile changes rather than always_run —
      # it fires only when a dependency could have changed, keeping unrelated
      # (and offline) commits fast and network-free.
      - id: licenses-deps
        name: dependency licenses
        entry: just licenses-deps
        language: system
        pass_filenames: false
        files: ^(uv\.lock|pnpm-lock\.yaml)$
