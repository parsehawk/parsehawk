repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src tests
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty check
        entry: uv run ty check src tests
        language: system
        pass_filenames: false
        always_run: true

      - id: unit-tests
        name: unit tests
        entry: uv run pytest tests/unit
        language: system
        pass_filenames: false
        always_run: true

      - id: web-typecheck
        name: web typecheck
        entry: pnpm --dir apps/web typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: web-tests
        name: web tests
        entry: pnpm --dir apps/web test
        language: system
        pass_filenames: false
        always_run: true
