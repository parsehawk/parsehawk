repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      # Entries delegate to `just` recipes so each command is defined once in
      # the justfile (single source of truth). CI runs the same recipes.
      - id: ruff-format
        name: ruff format
        entry: just format-check
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: just lint
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty check
        entry: just typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: unit-tests
        name: unit tests
        entry: just test-unit
        language: system
        pass_filenames: false
        always_run: true

      - id: web-typecheck
        name: web typecheck
        entry: just web-typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: web-tests
        name: web tests
        entry: just web-test
        language: system
        pass_filenames: false
        always_run: true
