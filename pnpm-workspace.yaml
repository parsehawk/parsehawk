packages:
  - "apps/*"
allowBuilds:
  esbuild: true

# systeminformation is a transitive dep (shadcn -> @dotenvx/dotenvx) whose 5.31.8
# release landed in our lockfile <24h after publish, tripping pnpm's
# minimumReleaseAge supply-chain guard. Exempt only this package; the age guard
# stays active for everything else. Safe to drop once dotenvx resolves to an aged
# version (or remove the pin and let it re-resolve).
minimumReleaseAgeExclude:
  - systeminformation
