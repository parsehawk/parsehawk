name: ci-test

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the changes job widens its own scope below.
permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    # No diff to inspect on a manual dispatch; the test job runs
    # unconditionally in that case, so path detection only applies to PRs.
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Detect Python-affecting changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - '.github/workflows/ci-test.yaml'

  test:
    name: unit + integration (${{ matrix.os }})
    needs: changes
    # Run when Python-affecting files changed, or on a manual dispatch (where
    # the changes job is skipped). !cancelled() lets this evaluate even though
    # its dependency was skipped.
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon macOS (arm64)
          - os: macos-14
          # Linux (x86_64)
          - os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Sync dependencies
        run: uv sync --frozen

      # `just test` == `uv run pytest`, which runs the unit + integration
      # suite with the 100% coverage gate. tests/e2e is excluded via the
      # default `-m 'not e2e'` addopts because it needs the local model runtime.
      - name: Run tests
        run: just test
