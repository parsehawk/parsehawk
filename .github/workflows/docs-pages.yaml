name: docs-pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'openapi/**'
      - 'docs/schemas/**'
      - 'scripts/export_reference_docs.py'
      - 'src/parsehawk/cli/main.py'
      - 'src/parsehawk/config.py'
      - 'src/parsehawk/server/api/**'
      - 'src/parsehawk/core/domain/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'justfile'
      - '.github/workflows/docs-pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Sync Python dependencies
        run: uv sync --frozen --all-extras

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and build docs
        run: just docs-check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/dist

  deploy:
    name: deploy docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
